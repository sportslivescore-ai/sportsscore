<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportScore Live</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #111827;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: #1f2937;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
}

.live {
    color: #22c55e;
    font-weight: bold;
}

.status {
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
⚽ SportScore Live - Global Football Scores
</header>

<div class="container" id="matches">
Loading live matches...
</div>

<script>
const API_KEY = "3a0d5b0f0e77e2f681775ef1a20d237e";

async function loadMatches() {
    try {
        const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
            method: "GET",
            headers: {
                "x-apisports-key": API_KEY
            }
        });

        const data = await res.json();
        const matches = data.response;

        let html = "";

        if (!matches || matches.length === 0) {
            html = "<p>No live matches right now ⚽</p>";
        } else {
            matches.forEach(match => {
                html += `
                    <div class="card">
                        <div class="live">🔴 LIVE</div>
                        <h3>${match.teams.home.name} vs ${match.teams.away.name}</h3>
                        <p>Score: ${match.goals.home ?? 0} - ${match.goals.away ?? 0}</p>
                        <p class="status">${match.fixture.status.long}</p>
                    </div>
                `;
            });
        }

        document.getElementById("matches").innerHTML = html;

    } catch (error) {
        document.getElementById("matches").innerHTML =
            "<p style='color:red'>Error loading data ❌</p>";
    }
}

loadMatches();
setInterval(loadMatches, 30000); // auto refresh every 30 sec
</script>

</body>
</html>
