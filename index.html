<!DOCTYPE html>
<html>
<head>
  <title>SportScore</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial">

<h2 style="text-align:center">⚽ SportScore Live</h2>

<div style="text-align:center;margin:20px">
  <button onclick="loadMatches()">Load Matches</button>
</div>

<!-- ⚠️ THIS IS MOST IMPORTANT -->
<div id="matches" style="padding:20px">
  Loading...
</div>

<script>

const API_URL =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-06-30";

async function loadMatches() {

  const box = document.getElementById("matches");
  box.innerHTML = "Loading...";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.events) {
      box.innerHTML = "No matches found ⚽";
      return;
    }

    let events = data.events.filter(e =>
      e.strSport === "Soccer"
    );

    if (events.length === 0) {
      box.innerHTML = "No football matches ⚽";
      return;
    }

    let html = "";

    events.forEach(m => {
      html += `
        <div style="background:#1f2937;margin:10px;padding:10px;border-radius:10px">
          <h3>${m.strEvent}</h3>
          <p>${m.dateEvent} | ${m.strTime}</p>
        </div>
      `;
    });

    box.innerHTML = html;

  } catch (err) {
    box.innerHTML = "Error loading data ❌";
    console.log(err);
  }
}

// auto run
loadMatches();

</script>

</body>
</html>
