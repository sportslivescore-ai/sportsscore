<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportScore Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .live {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  ⚽ SportScore Live - Global Football Scores
</header>

<div class="container">

  <div class="card">
    <div class="live">LIVE</div>
    <h3>Manchester United vs Chelsea</h3>
    <p>Score: 1 - 0</p>
  </div>

  <div class="card">
    <h3>Real Madrid vs Barcelona</h3>
    <p>Upcoming - 9:00 PM</p>
  </div>

</div>

</body>
</html>
