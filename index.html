<script>

const API_URL =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-06-30";

async function loadMatches() {

  document.getElementById("matches").innerHTML = "Loading...";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.events) {
      document.getElementById("matches").innerHTML =
        "No matches found ⚽";
      return;
    }

    // 🔥 STRONG FILTER (IMPORTANT FIX)
    const events = data.events.filter(e =>
      e.strSport === "Soccer" &&
      e.strEvent &&
      e.strEvent.includes(" vs ")
    );

    if (events.length === 0) {
      document.getElementById("matches").innerHTML =
        "No football matches today ⚽";
      return;
    }

    let html = "";

    events.forEach(match => {

      html += `
        <div class="card">
          <div class="live">⚽ ${match.strStatus || "Scheduled"}</div>
          <h3>${match.strEvent}</h3>
          <p>${match.dateEvent} | ${match.strTime}</p>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;

  } catch (err) {
    document.getElementById("matches").innerHTML =
      "Error loading data ❌";
  }
}

loadMatches();

</script>
