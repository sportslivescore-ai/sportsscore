<script>

const API_URL =
"https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-06-30";

async function loadMatches(type) {

  document.getElementById("matches").innerHTML = "Loading...";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    let events = data.events;

    if (!events) {
      document.getElementById("matches").innerHTML = "No matches found ⚽";
      return;
    }

    // FILTER ONLY FOOTBALL
    events = events.filter(e => e.strSport === "Soccer");

    let html = "";

    events.forEach(match => {

      let status = match.strStatus || "Scheduled";

      html += `
        <div class="card">
          <div class="live">⚽ ${status}</div>
          <h3>${match.strEvent}</h3>
          <p>${match.dateEvent} | ${match.strTime}</p>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML =
      html || "No football matches today ⚽";

  } catch (err) {
    document.getElementById("matches").innerHTML =
      "Error loading data ❌";
  }
}

loadMatches('live');

</script>
