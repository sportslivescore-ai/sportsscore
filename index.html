<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportScore Pro Live</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #111827;
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px;
    flex-wrap: wrap;
}

.tab {
    padding: 10px 15px;
    background: #1f2937;
    border-radius: 8px;
    cursor: pointer;
}

.tab.active {
    background: #22c55e;
    color: black;
}

.container {
    padding: 15px;
}

.card {
    background: #1f2937;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
}

.live { color: #22c55e; font-weight: bold; }
.upcoming { color: #facc15; font-weight: bold; }
.finished { color: #ef4444; font-weight: bold; }

.small {
    font-size: 12px;
    opacity: 0.8;
}

.loading {
    text-align: center;
    opacity: 0.7;
}
</style>
</head>

<body>

<header>⚽ SportScore Pro - Global Football</header>

<div class="tabs">
    <div class="tab active" onclick="setTab('live')">Live</div>
    <div class="tab" onclick="setTab('upcoming')">Upcoming</div>
    <div class="tab" onclick="setTab('finished')">Finished</div>
</div>

<div class="container" id="matches">
    <div class="loading">Loading matches...</div>
</div>

<script>

const API_KEY = "12ecb6814c03b81110a06acadc488b58";

let currentTab = "live";

function setTab(tab) {
    currentTab = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");

    loadMatches();
}

async function loadMatches() {

    let url = "";

    if (currentTab === "live") {
        url = "https://v3.football.api-sports.io/fixtures?live=all";
    } 
    else if (currentTab === "upcoming") {
        url = "https://v3.football.api-sports.io/fixtures?next=10";
    } 
    else {
        url = "https://v3.football.api-sports.io/fixtures?last=10";
    }

    try {

        const res = await fetch(url, {
            method: "GET",
            headers: {
                "x-apisports-key": API_KEY
            }
        });

        const data = await res.json();
        const matches = data.response;

        let html = "";

        // ✅ FIX: No crash + smart fallback
        if (!matches || matches.length === 0) {

            html = `
                <div class="card">
                    <h3>No matches found ⚽</h3>
                    <p>Try another tab (Live / Upcoming / Finished)</p>
                </div>
            `;

        } else {

            matches.forEach(m => {

                let statusClass = "upcoming";

                if (currentTab === "live") statusClass = "live";
                if (currentTab === "finished") statusClass = "finished";

                html += `
                    <div class="card">
                        <div class="${statusClass}">
                            ${m.fixture.status.long}
                        </div>

                        <h3>
                            ${m.teams.home.name} vs ${m.teams.away.name}
                        </h3>

                        <p>
                            Score: ${m.goals.home ?? "-"} - ${m.goals.away ?? "-"}
                        </p>

                        <div class="small">
                            League: ${m.league.name}
                            <br>
                            Date: ${new Date(m.fixture.date).toLocaleString()}
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById("matches").innerHTML = html;

    } catch (error) {

        document.getElementById("matches").innerHTML = `
            <div class="card">
                <h3 style="color:red">API Error ❌</h3>
                <p>Check your API key or internet connection</p>
            </div>
        `;
    }
}

loadMatches();
setInterval(loadMatches, 30000);

</script>

</body>
</html>
