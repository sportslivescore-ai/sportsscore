<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportScore Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      background: #111827;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .tab {
      padding: 10px 20px;
      background: #1f2937;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    .tab.active {
      background: #22c55e;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .live {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  ⚽ SportScore Live - Global Football Scores
</header>

<div class="tabs">
  <button class="tab active" onclick="loadMatches('live')">Live</button>
  <button class="tab" onclick="loadMatches('upcoming')">Upcoming</button>
  <button class="tab" onclick="loadMatches('finished')">Finished</button>
</div>

<div class="container" id="matches">
  Loading matches...
</div>

<script>
const API_KEY = "a05088a40df1f95f23f08f21bd5dd6ed";

async function loadMatches(type) {
  let url = "";

  if (type === "live") {
    url = "https://v3.football.api-sports.io/fixtures?live=all";
  } 
  else if (type === "upcoming") {
    url = "https://v3.football.api-sports.io/fixtures?next=10";
  } 
  else {
    url = "https://v3.football.api-sports.io/fixtures?last=10";
  }

  document.getElementById("matches").innerHTML = "Loading...";

  try {
    const res = await fetch(url, {
      method: "GET",
      headers: {
        "x-apisports-key": API_KEY
      }
    });

    const data = await res.json();

    const matches = data.response;

    if (!matches || matches.length === 0) {
      document.getElementById("matches").innerHTML =
        "No matches found ⚽";
      return;
    }

    document.getElementById("matches").innerHTML = matches.map(m => {
      return `
        <div class="card">
          <div class="live">${type.toUpperCase()}</div>
          <h3>${m.teams.home.name} vs ${m.teams.away.name}</h3>
          <p>
            Score: ${m.goals.home ?? 0} - ${m.goals.away ?? 0}
          </p>
        </div>
      `;
    }).join("");

  } catch (error) {
    document.getElementById("matches").innerHTML =
      "Error loading data ⚠️";
    console.log(error);
  }
}

// default load
loadMatches('live');
</script>

</body>
</html>
