<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportScore Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px;
    }

    .tabs button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1f2937;
      color: white;
    }

    .tabs button.active {
      background: #22c55e;
    }

    #container {
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .status {
      color: #22c55e;
      font-weight: bold;
    }

    button.load {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>⚽ SportScore Live</header>

<button class="load" onclick="loadMatches()">Load Matches</button>

<div class="tabs">
  <button class="active" onclick="setType('live')">Live</button>
  <button onclick="setType('upcoming')">Upcoming</button>
  <button onclick="setType('finished')">Finished</button>
</div>

<div id="container"></div>

<script>
let currentType = "live";

// FREE API (TheSportsDB)
const API_KEY = "123"; // Free user
const BASE_URL = "https://www.thesportsdb.com/api/v1/json/123";

function setType(type) {
  currentType = type;

  document.querySelectorAll(".tabs button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  loadMatches();
}

async function loadMatches() {
  const container = document.getElementById("container");
  container.innerHTML = "Loading...";

  try {
    let url = "";

    if (currentType === "live") {
      url = `${BASE_URL}/livescore.php?livescore=yes`;
    } 
    else if (currentType === "upcoming") {
      url = `${BASE_URL}/eventsnext.php?id=133602`; // sample league
    } 
    else {
      url = `${BASE_URL}/eventspastleague.php?id=133602`;
    }

    const res = await fetch(url);
    const data = await res.json();

    let events = data.events || data.events || [];

    // SAFE FILTER (football only)
    events = events.filter(e =>
      (e.strSport || "").toLowerCase().includes("foot") ||
      (e.strSport || "").toLowerCase().includes("soccer")
    );

    if (!events.length) {
      container.innerHTML = `
        <div class="empty">
          ⚽ No matches found<br/>
          Try another tab
        </div>`;
      return;
    }

    container.innerHTML = "";

    events.forEach(match => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="status">${currentType.toUpperCase()}</div>
        <h3>${match.strEvent}</h3>
        <p>📅 ${match.dateEvent || "TBD"} | ⏰ ${match.strTime || ""}</p>
        <p>🏆 ${match.strLeague || ""}</p>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    document.getElementById("container").innerHTML =
      "⚠️ Error loading matches";
    console.log(err);
  }
}

// auto load
loadMatches();
</script>

</body>
</html>
